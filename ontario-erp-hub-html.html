const REGS=[{act:"Municipal Act, 2001 (S.O. 2001, c. 25)",short:"Municipal Act",cat:"Financial Governance",desc:"Primary legislation governing Ontario municipalities. Requires annual budgets, audited financial statements, reserve fund policies, and establishes treasurer/CFO responsibilities.",systems:"All",impact:"ERP must support fund accounting, budget preparation, reserve tracking, and produce PSAB-aligned financial statements.",reqs:["Annual budget adoption","Audited financial statements (PSAB)","Reserve fund management","Debt and investment reporting","Treasurer accountability controls"]},{act:"O. Reg. 284/09 (Budget Matters — Accrual Accounting)",short:"O. Reg. 284/09",cat:"Accounting Standards",desc:"Mandates municipalities prepare budgets using full accrual under PSAB. Requires TCA reporting and amortization in budgets.",systems:"All — especially Sage 300, Dynamics GP",impact:"ERP must handle full accrual accounting, TCA registers, amortization schedules, and PSAB-compliant reporting.",reqs:["Full accrual budgeting","TCA tracking and amortization","PSAB-aligned financial reporting","Budget-to-actual reconciliation"]},{act:"Municipal Freedom of Information and Protection of Privacy Act (MFIPPA)",short:"MFIPPA",cat:"Privacy & Data",desc:"Governs collection, use, retention, disclosure, and disposal of personal information by municipalities. Requires Canadian data residency.",systems:"All — especially cloud-deployed systems",impact:"ERP must ensure Canadian data residency, role-based access, audit trails, and records retention schedules.",reqs:["Canadian data residency","Role-based access controls","Audit trail / access logging","Records retention & disposition","Privacy impact assessments"]},{act:"Broader Public Sector Accountability Act (BPSAA, 2010)",short:"BPSAA",cat:"Procurement & Accountability",desc:"Establishes accountability framework for BPS organizations. Requires compliance with BPS Procurement Directive and competitive processes.",systems:"All — procurement modules specifically",impact:"ERP procurement modules must support competitive bidding, approval hierarchies, vendor management, and expense reporting.",reqs:["Competitive procurement workflows","Purchase approval hierarchies","Expense reporting & controls","Vendor performance tracking","Procurement reporting"]},{act:"Accessibility for Ontarians with Disabilities Act (AODA, 2005)",short:"AODA",cat:"Accessibility",desc:"Requires WCAG 2.0 Level AA for web-based content. Applies to all public-facing and internal web applications including ERP portals.",systems:"All — especially legacy UI systems (GP, Sage 300, older SAP GUI)",impact:"ERP web interfaces and portals must meet WCAG 2.0 AA. Legacy thick-client ERPs face significant challenges.",reqs:["WCAG 2.0 Level AA compliance","Screen reader compatibility","Keyboard navigation","Accessible citizen portals","Vendor accessibility roadmap"]},{act:"Public Sector Accounting Board Standards (PSAB / CPA Canada)",short:"PSAB Standards",cat:"Accounting Standards",desc:"National standards for government financial reporting (PS 1201, PS 3150 TCA, PS 3260, PS 3400, etc.).",systems:"All — core requirement",impact:"ERP chart of accounts, reporting, and financial statement preparation must align with PSAB handbook. Commercial ERPs often lack native support.",reqs:["Fund-based chart of accounts","TCA (PS 3150) asset register","Segment/program reporting","Liability classification (PS 3260)","Revenue recognition (PS 3400)","Consolidated reporting"]},{act:"Personal Health Information Protection Act (PHIPA, 2004)",short:"PHIPA",cat:"Privacy & Data",desc:"Protects personal health information. Relevant for municipalities operating public health, LTC, or paramedic services.",systems:"SAP, PeopleSoft, JDE — HR/Payroll modules",impact:"ERP HR/Payroll modules handling health-related data must provide enhanced data protection and consent management.",reqs:["Enhanced encryption for health data","Consent-based data access","Restricted role access","Breach notification capability"]}];

const eolColors={red:"#dc2626",yellow:"#d97706",green:"#16a34a"};
const eolBgs={red:"#fef2f2",yellow:"#fffbeb",green:"#f0fdf4"};
const eolLabels={red:"EOL / Sunset",yellow:"Approaching EOL",green:"Current"};

function badge(s){return`<span class="badge badge-${s}"><span class="badge-dot"></span>${eolLabels[s]}</span>`;}

let activeTab="search",expandedMuni=null,expandedErp=null,expandedReg=null;
let searchVal="",filterERP="All",filterEOL="All",filterTier="All",erpSearchVal="",regSearchVal="";

function renderStats(){
  const r=M.filter(m=>m.eol==="red").length,y=M.filter(m=>m.eol==="yellow").length,g=M.filter(m=>m.eol==="green").length;
  document.getElementById("stats").innerHTML=[
    {l:"Municipalities",v:M.length,c:"#1e40af",b:"#eff6ff"},
    {l:"EOL / Sunset",v:r,c:"#dc2626",b:"#fef2f2"},
    {l:"Approaching EOL",v:y,c:"#d97706",b:"#fffbeb"},
    {l:"Current",v:g,c:"#16a34a",b:"#f0fdf4"}
  ].map(s=>`<div class="stat" style="background:${s.b};border-color:${s.c}22"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-label" style="color:${s.c}">${s.l}</div></div>`).join("");
}

function renderTabs(){
  const tabs=[{id:"search",l:"🔍 Municipality Search"},{id:"opportunities",l:"🎯 Opportunity Radar"},{id:"erp",l:"🗄️ ERP Knowledge Base"},{id:"regs",l:"📜 Regulatory Reference"}];
  document.getElementById("tabs").innerHTML=tabs.map(t=>`<button class="tab ${activeTab===t.id?"active":""}" onclick="switchTab('${t.id}')">${t.l}</button>`).join("");
}

function switchTab(id){activeTab=id;renderTabs();document.querySelectorAll(".tab-content").forEach(e=>e.classList.add("hidden"));document.getElementById("tab-"+id).classList.remove("hidden");}

function getFilteredMunis(){
  return M.filter(m=>{
    const s=searchVal.toLowerCase();
    const ms=!s||m.name.toLowerCase().includes(s)||m.erp.toLowerCase().includes(s)||m.vendor.toLowerCase().includes(s);
    const me=filterERP==="All"||m.erp===filterERP;
    const mo=filterEOL==="All"||m.eol===filterEOL;
    const mt=filterTier==="All"||m.tier===filterTier;
    return ms&&me&&mo&&mt;
  });
}

function renderSearch(){
  const erps=["All",...[...new Set(M.map(m=>m.erp))]].sort();
  const tiers=["All",...[...new Set(M.map(m=>m.tier))]].sort();
  const fm=getFilteredMunis();
  let h=`<div class="filters">
    <input class="search-input" placeholder="Search municipality, ERP, or vendor..." value="${searchVal}" oninput="searchVal=this.value;renderSearch()">
    <select onchange="filterERP=this.value;renderSearch()">${erps.map(o=>`<option ${filterERP===o?"selected":""}>${o}</option>`).join("")}</select>
    <select onchange="filterEOL=this.value;renderSearch()"><option value="All" ${filterEOL==="All"?"selected":""}>All EOL Status</option><option value="red" ${filterEOL==="red"?"selected":""}>EOL / Sunset</option><option value="yellow" ${filterEOL==="yellow"?"selected":""}>Approaching EOL</option><option value="green" ${filterEOL==="green"?"selected":""}>Current</option></select>
    <select onchange="filterTier=this.value;renderSearch()">${tiers.map(o=>`<option ${filterTier===o?"selected":""}>${o}</option>`).join("")}</select>
  </div>`;
  h+=`<div class="result-count">${fm.length} results — click a row to expand details</div>`;
  h+=`<div style="overflow-x:auto"><table><thead><tr><th>Municipality</th><th>Tier</th><th>Pop.</th><th>ERP System</th><th>Vendor</th><th>Deploy</th><th>Data Res.</th><th>EOL Status</th></tr></thead><tbody>`;
  if(fm.length===0)h+=`</tbody></table><div class="empty">No municipalities match your filters.</div>`;
  else{
    fm.forEach(m=>{
      h+=`<tr onclick="toggleMuni(${m.id})"><td class="muni-name">${m.name}</td><td class="text-muted">${m.tier}</td><td class="text-muted">${m.pop.toLocaleString()}</td><td class="erp-name">${m.erp}</td><td class="text-muted">${m.vendor}</td><td class="text-muted">${m.deployment}</td><td class="text-muted">${m.dr}</td><td>${badge(m.eol)}</td></tr>`;
      if(expandedMuni===m.id){
        h+=`<tr class="detail-row"><td colspan="8"><div class="detail-grid"><div><div class="detail-label">EOL DETAIL</div><div>${m.eolNote}</div></div><div><div class="detail-label">COMPLIANCE</div><div>PSAB: ${m.psab?"✓":"✗"} | MFIPPA: ${m.mfippa?"✓":"✗"} | BPSAA: ${m.bpsaa?"✓":"✗"} | AODA: ${m.aoda}</div></div><div class="full-width"><div class="detail-label">NOTES</div><div>${m.notes}</div></div></div></td></tr>`;
      }
    });
    h+=`</tbody></table>`;
  }
  h+=`</div>`;
  document.getElementById("tab-search").innerHTML=h;
}

function toggleMuni(id){expandedMuni=expandedMuni===id?null:id;renderSearch();}

function getOffering(m){
  if(m.erp==="Microsoft Dynamics GP")return{p:"HIGH",o:"ERP Migration Assessment & Implementation",r:`Dynamics GP extended support ends April 2028 with no further feature development. ${m.name} must migrate to D365 Business Central, D365 F&O, or an alternative. Offer: Migration readiness assessment, requirements gathering, RFP support, implementation PM.`,t:"Immediate (12-24 months)",path:"D365 Business Central (cloud) or Vadim iCity"};
  if(m.erp==="SAP ECC 6.0")return{p:"HIGH",o:"S/4HANA Migration Planning & PM",r:`SAP ECC 6.0 mainstream maintenance ends 2027. ${m.name} must plan and execute S/4HANA migration. Offer: Migration assessment, project planning, PMO support, change management.`,t:"Now–2027 (12-36 months)",path:"SAP S/4HANA (on-prem or RISE with SAP cloud)"};
  if(m.erp==="Sage 300 (Accpac)")return{p:"MEDIUM",o:"ERP Modernization Assessment",r:`Sage 300 lacks a clear municipal roadmap and has growing compliance gaps. ${m.name} should evaluate purpose-built alternatives. Offer: Current state assessment, gap analysis, vendor evaluation, RFP support.`,t:"Medium-term (12-36 months)",path:"Vadim iCity, D365 Business Central, or Oracle JDE E1"};
  if(m.erp==="Oracle PeopleSoft")return{p:"MEDIUM",o:"Cloud Strategy & Migration Assessment",r:`Oracle's strategic direction is Fusion Cloud ERP. While PeopleSoft remains supported, ${m.name} faces long-term platform risk. Offer: Cloud readiness assessment, Fusion evaluation, migration roadmap.`,t:"Medium-term (24-48 months)",path:"Oracle Fusion Cloud ERP or competitive evaluation"};
  return null;
}

function renderOpportunities(){
  const opps=M.filter(m=>m.eol==="red"||m.eol==="yellow").sort((a,b)=>{if(a.eol==="red"&&b.eol!=="red")return-1;if(a.eol!=="red"&&b.eol==="red")return 1;return b.pop-a.pop;});
  let h=`<div class="opp-notice"><strong>Opportunity Scoring:</strong> Sorted by EOL urgency (red first) then population. Red = immediate (GP/ECC sunset), Yellow = medium-term planning window.</div>`;
  opps.forEach(m=>{
    const o=getOffering(m);if(!o)return;
    h+=`<div class="opp-card ${m.eol}"><div class="opp-header"><div><div class="opp-title">${m.name}</div><div class="opp-sub">${m.tier} · Pop. ${m.pop.toLocaleString()} · ${m.erp}</div></div><div class="opp-badges">${badge(m.eol)}<span class="priority-tag ${o.p==="HIGH"?"priority-high":"priority-med"}">${o.p} PRIORITY</span></div></div><div class="opp-grid"><div><div class="opp-label">OFFERING</div><div class="opp-offering">${o.o}</div></div><div><div class="opp-label">TIMEFRAME</div><div>${o.t}</div></div><div class="full-width"><div class="opp-label">RATIONALE</div><div style="color:#374151;line-height:1.5">${o.r}</div></div><div class="full-width"><div class="opp-label">TARGET MIGRATION PATH</div><div class="opp-target">${o.path}</div></div></div></div>`;
  });
  document.getElementById("tab-opportunities").innerHTML=h;
}

function renderErpKB(){
  const filtered=erpSearchVal?ERP.filter(e=>e.name.toLowerCase().includes(erpSearchVal.toLowerCase())||e.vendor.toLowerCase().includes(erpSearchVal.toLowerCase())):ERP;
  let h=`<input class="search-input" style="width:100%;margin-bottom:16px" placeholder="Search ERP system or vendor..." value="${erpSearchVal}" oninput="erpSearchVal=this.value;renderErpKB()">`;
  filtered.forEach((e,i)=>{
    const open=expandedErp===i;
    h+=`<div class="accordion"><div class="accordion-header" onclick="expandedErp=expandedErp===${i}?null:${i};renderErpKB()"><div><span class="accordion-title">${e.name}</span><span class="accordion-vendor">by ${e.vendor} (${e.hq})</span></div><span class="accordion-toggle">${open?"−":"+"}</span></div>`;
    if(open){
      h+=`<div class="accordion-body"><div class="erp-grid">`;
      [["Deployment",e.deployment],["Data Residency",e.dr],["EOL / Support",e.eol],["Municipal Fit",e.fit],["PSAB Compliance",e.psab],["MFIPPA Compliance",e.mfippa],["BPSAA Compliance",e.bpsaa],["AODA Compliance",e.aoda]].forEach(([l,v])=>{
        h+=`<div><div class="erp-label">${l.toUpperCase()}</div><div class="erp-val">${v}</div></div>`;
      });
      h+=`<div class="full-width"><div class="erp-label">STRATEGIC NOTES</div><div class="erp-val" style="line-height:1.5">${e.notes}</div></div></div></div>`;
    }
    h+=`</div>`;
  });
  document.getElementById("tab-erp").innerHTML=h;
}

function renderRegs(){
  const filtered=regSearchVal?REGS.filter(r=>r.act.toLowerCase().includes(regSearchVal.toLowerCase())||r.short.toLowerCase().includes(regSearchVal.toLowerCase())||r.cat.toLowerCase().includes(regSearchVal.toLowerCase())):REGS;
  let h=`<input class="search-input" style="width:100%;margin-bottom:16px" placeholder="Search acts, regulations, or categories..." value="${regSearchVal}" oninput="regSearchVal=this.value;renderRegs()">`;
  filtered.forEach((r,i)=>{
    const open=expandedReg===i;
    h+=`<div class="accordion"><div class="accordion-header" onclick="expandedReg=expandedReg===${i}?null:${i};renderRegs()"><div><span class="accordion-title">${r.short}</span><span class="cat-badge">${r.cat}</span><span class="impacts">Impacts: ${r.systems}</span></div><span class="accordion-toggle">${open?"−":"+"}</span></div>`;
    if(open){
      h+=`<div class="accordion-body" style="font-size:13px"><div style="margin-bottom:12px"><div class="erp-label">FULL NAME</div><div>${r.act}</div></div><div style="margin-bottom:12px"><div class="erp-label">DESCRIPTION</div><div style="line-height:1.5">${r.desc}</div></div><div style="margin-bottom:12px"><div class="erp-label">ERP IMPACT</div><div style="line-height:1.5">${r.impact}</div></div><div><div class="erp-label">KEY REQUIREMENTS</div><div class="req-tags">${r.reqs.map(q=>`<span class="req-tag">${q}</span>`).join("")}</div></div></div>`;
    }
    h+=`</div>`;
  });
  document.getElementById("tab-regs").innerHTML=h;
}

function init(){renderStats();renderTabs();renderSearch();renderOpportunities();renderErpKB();renderRegs();}
init();
</script>
</body>
</html>
